services:
  nginx:
    container_name: nginx
    image: nginx
    restart: always
    depends_on:
      - wordpress
      - mariadb
    build:
      context: ./requirements/nginx
    ports:
      - 443:443
    networks:
      - inception

  wordpress:
    container_name: wordpress
    image: wordpress
    restart: always
    depends_on:
      - mariadb
    build:
      context: ./requirements/wordpress
    volumes:
      - wordpress:/var/www/html
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
      - mysql_root_password
    networks:
      - inception

  mariadb:
    container_name: mariadb
    image: mariadb
    restart: always
    build:
      context: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
      - mysql_root_password
    networks:
      - inception
    

networks:
  inception:
    driver: bridge

volumes:
  wordpress:
  mariadb:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_name:
    file: ./secrets/mysql_name
  mysql_user:
    file: ./secrets/mysql_user
  mysql_password:
    file: ./secrets/mysql_password
