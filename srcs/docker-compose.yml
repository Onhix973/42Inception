services:
  nginx:
    container_name: nginx
    image: nginx
    restart: on-failure
    depends_on:
      - wordpress
    build:
      context: ./requirements/nginx
    ports:
      - 443:443
    networks:
      - inception

  wordpress:
    container_name: wordpress
    image: wordpress
    restart: on-failure
    depends_on:
      - mariadb
    build:
      context: ./requirements/wordpress
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
      - mysql_root_password
    networks:
      - inception

  mariadb:
    container_name: mariadb
    image: mariadb
    restart: on-failure
    build:
      context: ./requirements/mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
      - mysql_root_password
    networks:
      - inception
    

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tlutz/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tlutz/data/mariadb

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_name:
    file: ./secrets/mysql_name
  mysql_user:
    file: ./secrets/mysql_user
  mysql_password:
    file: ./secrets/mysql_password
