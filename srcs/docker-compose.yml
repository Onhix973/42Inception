services:
  nginx:
    container_name: nginx
    image: nginx
    restart: on-failure
    depends_on:
      - wordpress
    build:
      context: ./requirements/nginx
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - 8443:443
    networks:
      - inception
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}

  wordpress:
    container_name: wordpress
    image: wordpress
    restart: on-failure
    depends_on:
      - mariadb
    build:
      context: ./requirements/wordpress
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
      - wp_admin
      - wp_admin_password
      - wp_user
      - wp_user_password
    networks:
      - inception
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - SITE_TITLE=${SITE_TITLE}

  mariadb:
    container_name: mariadb
    image: mariadb
    restart: on-failure
    build:
      context: ./requirements/mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - mysql_name
      - mysql_user
      - mysql_password
    networks:
      - inception
    

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tlutz/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tlutz/data/mariadb

secrets:
  mysql_name:
    file: ./secrets/mysql_name
  mysql_user:
    file: ./secrets/mysql_user
  mysql_password:
    file: ./secrets/mysql_password
  wp_admin:
    file: ./secrets/wp_admin
  wp_admin_password:
    file: ./secrets/wp_admin_password
  wp_user:
    file: ./secrets/wp_user
  wp_user_password:
    file: ./secrets/wp_user_password
