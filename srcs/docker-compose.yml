services:
  nginx:
    container_name: nginx
    restart: on-failure
    build:
      context: ./requirements/nginx
    ports:
      - 443:443
    volumes:
      - ./certs:/etc/nginx/certs:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - Inception
    expose:
      - 9000
  
  wordpress:
    container_name: wordpress
    restart: on-failure
    build:
      context: ./requirements/wordpress
    networks:
      - Inception
    expose:
      - 9000
      - 3306
    volumes:
      - wordpress:/var/wordpress/www